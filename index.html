<!DOCTYPE html>
<html>
<head>
<title>Connecting...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:#000;
  color:#0ff;
  font-family:sans-serif;
  text-align:center;
  padding-top:40%;
}
</style>
</head>

<body>

<h2>🚀 Connecting to DJ Official Network...</h2>
<p>Please wait...</p>

<script>
<script>
// 🌐 CONFIG
const sites = {
  main: {
    servers: [
      "https://mrdanish.netlify.app/",
      "https://mrdanish.vercel.app/"
    ],
    maintenance: "https://future-updates.vercel.app/"
  }
};

// 🔍 Get selected site
const params = new URLSearchParams(window.location.search);
const selected = params.get("site") || "main";
const config = sites[selected];

// ⏱️ Health check function (REAL check)
async function checkServer(url, timeout = 3000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);

  try {
    // Use HEAD request for lightweight check
    await fetch(url, {
      method: "HEAD",
      mode: "no-cors",
      signal: controller.signal
    });

    clearTimeout(timer);
    return true; // reachable
  } catch (e) {
    clearTimeout(timer);
    return false; // failed
  }
}

// 🚀 Smart sequential routing
(async function route() {
  for (const server of config.servers) {
    const isUp = await checkServer(server);

    if (isUp) {
      window.location.replace(server);
      return;
    }
  }

  // ❌ All failed → maintenance
  window.location.replace(config.maintenance);
})();
</script>

</body>
</html>
