<!DOCTYPE html>
<html>
<head>
<title>Connecting...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:#000;
  color:#0ff;
  font-family:sans-serif;
  text-align:center;
  padding-top:40%;
}
</style>
</head>

<body>

<h2>🚀 Connecting to DJ Official Network...</h2>
<p>Please wait...</p>

<script>
// 🌐 Define ALL your websites here
const sites = {
  main: {
    servers: [
      "https://mrdanish.netlify.app/",
      "https://mrdanish.vercel.app/"
    ],
    maintenance: "https://future-updates.vercel.app/"
  },

  agency: {
    servers: [
      "https://agency-site.netlify.app/",
      "https://agency-site.vercel.app/"
    ],
    maintenance: "https://future-updates.vercel.app/"
  },

  crush: {
    servers: [
      "https://crushlivee.netlify.app/",
      "https://crushlivee.vercel.app/"
    ],
    maintenance: "https://future-updates.vercel.app/"
  }
};

// 🔍 Get which site user wants
const params = new URLSearchParams(window.location.search);
const selected = params.get("site") || "main";

// 🎯 Get config
const config = sites[selected];

let redirected = false;

// 🚀 Check servers
function checkServer(url){
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(),3000);

  fetch(url,{mode:"no-cors", signal:controller.signal})
    .then(()=>{
      if(!redirected){
        redirected = true;
        window.location.href = url;
      }
    })
    .catch(()=>{})
    .finally(()=>clearTimeout(timeout));
}

// Run checks
config.servers.forEach(checkServer);

// ❌ If all fail → maintenance
setTimeout(()=>{
  if(!redirected){
    window.location.href = config.maintenance;
  }
},3500);
</script>

</body>
</html>
